<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<!-- ✅ 手机 App 化（关键） -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>随机遗传漂变模拟</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ✅ 整体微缩（关键） */
#main {
	transform: scale(0.68);
	transform-origin: top center;
	width: 100vw;
}

body {
	margin: 0;
	padding: 0;
	background: #ffffff;
	font-family: "Microsoft YaHei", Arial, sans-serif;
}

h2 {
	font-size: 38px;
	margin: 20px 0 10px 20px;
}

.controls {
	margin-left: 20px;
	margin-bottom: 10px;
}

label {
	font-size: 22px;
	margin-right: 12px;
}

input {
	font-size: 22px;
	width: 100px;
	padding: 6px;
}

button {
	font-size: 22px;
	padding: 12px 24px;
	cursor: pointer;
}

/* ✅ 16:9 锁定 */
#chart-container {
	width: 92vw;
	aspect-ratio: 16 / 9;
	margin: 0 auto;
	background: #fff;
	border-radius: 14px;
	box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

canvas {
	width: 100% !important;
	height: 100% !important;
	display: block;
}

#stats {
	width: 92vw;
	margin: 15px auto 0 auto;
	padding: 18px 24px;
	font-size: 24px;
	background: #f2f2f2;
	border-radius: 12px;
}

#stats span {
	margin-right: 40px;
}
</style>
</head>

<body>

<div id="main">

<h2>🧬 随机遗传漂变模拟</h2>

<div class="controls">
	<label>p₀:
		<input type="number" id="p0" value="0.07" step="0.1" min="0" max="1">
	</label>
	<label>N:
		<input type="number" id="N" value="7" min="1">
	</label>
	<label>代数 T:
		<input type="number" id="T" value="50" min="1">
	</label>
	<label>模拟次数:
		<input type="number" id="runs" value="100" min="1" max="1000">
	</label>
	<button onclick="startSimulation()">▶ 开始模拟</button>
</div>

<div id="chart-container">
	<canvas id="driftChart"></canvas>
</div>

<div id="stats">
	<span>✅ 固定: <b id="fixed">0</b></span>
	<span>❌ 丢失: <b id="lost">0</b></span>
	<span>➖ 多态: <b id="polymorphic">0</b></span>
</div>

</div>

<script>
let chart;
let animationTimer;

function startSimulation() {
	const p0 = parseFloat(document.getElementById("p0").value);
	const N = parseInt(document.getElementById("N").value);
	const T = parseInt(document.getElementById("T").value);
	const runs = parseInt(document.getElementById("runs").value);

	if (chart) chart.destroy();
	clearInterval(animationTimer);

	document.getElementById("fixed").innerText = 0;
	document.getElementById("lost").innerText = 0;
	document.getElementById("polymorphic").innerText = runs;

	const colors = generateColors(runs);
	const datasets = [];

	for (let r = 0; r < runs; r++) {
		datasets.push({
			label: "Run " + (r + 1),
			data: [p0],
			borderColor: colors[r],
			borderWidth: 3,
			fill: false,
			pointRadius: 0,
			tension: 0.25
		});
	}

	const ctx = document.getElementById("driftChart").getContext("2d");
	chart = new Chart(ctx, {
		type: "line",
		data: {
			labels: [0],
			datasets: datasets
		},
		options: {
			responsive: true,
			maintainAspectRatio: false,
			animation: false,
			plugins: { legend: { display: false } },
			scales: {
				x: {
					title: {
						display: true,
						text: "Generation",
						font: { size: 26 }
					},
					ticks: { font: { size: 20 } }
				},
				y: {
					min: 0,
					max: 1,
					title: {
						display: true,
						text: "Frequency of A",
						font: { size: 26 }
					},
					ticks: { font: { size: 20 } }
				}
			}
		}
	});

	let gen = 0;
	animationTimer = setInterval(() => {
		if (gen >= T) {
			clearInterval(animationTimer);
			return;
		}
		gen++;
		chart.data.labels.push(gen);

		let fixed = 0, lost = 0, poly = 0;

		chart.data.datasets.forEach(ds => {
			const last = ds.data[ds.data.length - 1];
			const countA = binomialSample(2 * N, last);
			const freq = countA / (2 * N);
			ds.data.push(freq);

			if (freq === 1) fixed++;
			else if (freq === 0) lost++;
			else poly++;
		});

		chart.update();

		document.getElementById("fixed").innerText = fixed;
		document.getElementById("lost").innerText = lost;
		document.getElementById("polymorphic").innerText = poly;

	}, 60);
}

function binomialSample(n, p) {
	let count = 0;
	for (let i = 0; i < n; i++) {
		if (Math.random() < p) count++;
	}
	return count;
}

function generateColors(n) {
	const palette = [
		"#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6",
		"#1abc9c","#d35400","#c0392b","#2980b9","#27ae60"
	];
	return Array.from({length: n}, (_, i) => palette[i % palette.length]);
}
</script>

</body>
</html>
