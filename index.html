<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>随机遗传漂变模拟</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
#main {
	transform: scale(0.68);
	transform-origin: top center;
	width: 100vw;
}

body {
	margin: 0;
	padding: 0;
	background: #ffffff;
	font-family: "Microsoft YaHei", Arial, sans-serif;
}

h2 {
	font-size: 38px;
	margin: 20px 0 10px 20px;
}

.controls {
	margin-left: 20px;
	margin-bottom: 10px;
	display: flex;
	align-items: center;
	flex-wrap: wrap;
	gap: 12px;
}

label {
	font-size: 22px;
}

input {
	font-size: 22px;
	width: 100px;
	padding: 6px;
}

button {
	font-size: 22px;
	padding: 12px 24px;
	cursor: pointer;
}

#speed-control {
	display: flex;
	align-items: center;
	gap: 8px;
	font-size: 22px;
}

#speedSlider {
	width: 180px;
}

#speedValue {
	font-weight: bold;
	min-width: 60px;
}

#pauseBtn {
	font-size: 22px;
	padding: 12px 24px;
	cursor: pointer;
}

#chart-container {
	width: 92vw;
	aspect-ratio: 16 / 9;
	margin: 0 auto;
	background: #fff;
	border-radius: 14px;
	box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

canvas {
	width: 100% !important;
	height: 100% !important;
	display: block;
}

#stats {
	width: 92vw;
	margin: 15px auto 0 auto;
	padding: 18px 24px;
	font-size: 24px;
	background: #f2f2f2;
	border-radius: 12px;
}

#stats span {
	margin-right: 40px;
}
</style>
</head>

<body>

<div id="main">

<h2>🧬 随机遗传漂变模拟</h2>

<div class="controls">
	<label>p₀:
		<input type="number" id="p0" value="0.07" step="0.05" min="0" max="1">
	</label>

	<label>N:
		<input type="number" id="N" value="7" min="1">
	</label>

	<label>代数 T:
		<input type="number" id="T" value="50" min="1">
	</label>

	<label>模拟次数:
		<input type="number" id="runs" value="100" min="1" max="2000">
	</label>

	<div id="speed-control">
		<label for="speedSlider">速度:</label>
		<input type="range" id="speedSlider" min="0.2" max="1" step="0.1" value="1">
		<span id="speedValue">1×</span>
	</div>

	<button onclick="startSimulation()">▶ 开始模拟</button>
	<button id="pauseBtn" onclick="togglePause()">⏸ 暂停</button>
</div>

<div id="chart-container">
	<canvas id="driftChart"></canvas>
</div>

<div id="stats">
	<span>✅ 固定: <b id="fixed">0</b></span>
	<span>❌ 丢失: <b id="lost">0</b></span>
	<span>➖ 多态: <b id="polymorphic">0</b></span>
</div>

</div>

<script>
let chart;
let animationTimer = null;

let paused = false;
let lastInterval = null;

function startSimulation() {
	const p0 = parseFloat(document.getElementById("p0").value);
	const N = parseInt(document.getElementById("N").value);
	const T = parseInt(document.getElementById("T").value);
	const runs = parseInt(document.getElementById("runs").value);

	if (chart) chart.destroy();
	clearInterval(animationTimer);

	paused = false;
	document.getElementById("pauseBtn").innerText = "⏸ 暂停";

	document.getElementById("fixed").innerText = 0;
	document.getElementById("lost").innerText = 0;
	document.getElementById("polymorphic").innerText = runs;

	const colors = generateColors(runs);
	const datasets = [];

	for (let r = 0; r < runs; r++) {
		datasets.push({
			label: "Run " + (r + 1),
			data: [p0],
			borderColor: colors[r],
			borderWidth: 4,
			fill: false,
			pointRadius: 0,
			tension: 0.25
		});
	}

	const ctx = document.getElementById("driftChart").getContext("2d");
	chart = new Chart(ctx, {
		type: "line",
		data: {
			labels: [0],
			datasets: datasets
		},
		options: {
			responsive: true,
			maintainAspectRatio: false,
			animation: false,
			plugins: { legend: { display: false } },
			scales: {
				x: {
					title: {
						display: true,
						text: "Generation",
						font: { size: 26 }
					},
					ticks: { font: { size: 20 } }
				},
				y: {
					min: 0,
					max: 1,
					title: {
						display: true,
						text: "Frequency of A",
						font: { size: 26 }
					},
					ticks: { font: { size: 20 } }
				}
			}
		}
	});

	let gen = 0;

	function tick() {
		if (gen >= T) {
			clearInterval(animationTimer);
			animationTimer = null;
			return;
		}

		gen++;
		chart.data.labels.push(gen);

		let fixed = 0, lost = 0, poly = 0;

		chart.data.datasets.forEach(ds => {
			const last = ds.data[ds.data.length - 1];
			const countA = binomialSample(2 * N, last);
			const freq = countA / (2 * N);
			ds.data.push(freq);

			if (freq === 1) fixed++;
			else if (freq === 0) lost++;
			else poly++;
		});

		chart.update();

		document.getElementById("fixed").innerText = fixed;
		document.getElementById("lost").innerText = lost;
		document.getElementById("polymorphic").innerText = poly;
	}

	function startTimer() {
		const speed = parseFloat(document.getElementById("speedSlider").value);
		lastInterval = Math.round(60 / speed);
		animationTimer = setInterval(tick, lastInterval);
	}

	startTimer();

	// ✅ 速度滑块实时生效
	document.getElementById("speedSlider").oninput = function () {
		document.getElementById("speedValue").innerText =
			parseFloat(this.value).toFixed(1) + "×";

		if (!paused && animationTimer) {
			clearInterval(animationTimer);
			startTimer();
		}
	};
}

function togglePause() {
	if (!animationTimer && !paused) return;

	if (!paused) {
		// 暂停
		clearInterval(animationTimer);
		animationTimer = null;
		paused = true;
		document.getElementById("pauseBtn").innerText = "▶ 继续";
	} else {
		// 继续
		paused = false;
		document.getElementById("pauseBtn").innerText = "⏸ 暂停";

		const speed = parseFloat(document.getElementById("speedSlider").value);
		const interval = Math.round(60 / speed);

		let gen = chart.data.labels.length - 1;
		const T = parseInt(document.getElementById("T").value);
		const N = parseInt(document.getElementById("N").value);

		animationTimer = setInterval(function tick() {
			if (gen >= T) {
				clearInterval(animationTimer);
				animationTimer = null;
				return;
			}

			gen++;
			chart.data.labels.push(gen);

			let fixed = 0, lost = 0, poly = 0;

			chart.data.datasets.forEach(ds => {
				const last = ds.data[ds.data.length - 1];
				const countA = binomialSample(2 * N, last);
				const freq = countA / (2 * N);
				ds.data.push(freq);

				if (freq === 1) fixed++;
				else if (freq === 0) lost++;
				else poly++;
			});

			chart.update();

			document.getElementById("fixed").innerText = fixed;
			document.getElementById("lost").innerText = lost;
			document.getElementById("polymorphic").innerText = poly;
		}, interval);
	}
}

function binomialSample(n, p) {
	let count = 0;
	for (let i = 0; i < n; i++) {
		if (Math.random() < p) count++;
	}
	return count;
}

function generateColors(n) {
	const palette = [
		"#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6",
		"#1abc9c","#d35400","#c0392b","#2980b9","#27ae60"
	];
	return Array.from({ length: n }, (_, i) => palette[i % palette.length]);
}
</script>

</body>
</html>
